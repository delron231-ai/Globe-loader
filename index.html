<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Globe Loader – Large</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #f1ece2;
    display: grid;
    place-items: center;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .stage {
    width: 720px;
    height: 720px;
    position: relative;
  }
  .stage svg {
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
</style>
</head>
<body>
  <div class="stage">
    <svg id="loader" viewBox="-100 -100 200 200"></svg>
  </div>

  <script>
  (function () {
    const INK   = "#1f1d1a";
    const PAPER = "#f1ece2";
    const RED   = "#c8332a";

    const HIGHLIGHT_IDS = new Set([
      840, // USA
      156, // China
      360, // Indonesia
      458, // Malaysia
      764, // Thailand
      704, // Vietnam
      608, // Philippines
      702, // Singapore
      104, // Myanmar
      418, // Laos
      116, // Cambodia
       96, // Brunei
      626, // Timor-Leste
      158  // Taiwan
    ]);

    const svg = d3.select("#loader");
    const R   = 58;
    const TILT = -18;

    const projection = d3.geoOrthographic()
      .scale(R).translate([0, 0]).clipAngle(90).precision(0.4);
    const geoPath = d3.geoPath(projection);

    /* ── whirl rings ── */
    const whirlG   = svg.append("g");
    const whirlArcs = [];
    const arcSpecs = [
      { r: R +  6, dash: "22 380", w: 0.9, op: 0.55, dir:  1, rate: 0.18 },
      { r: R + 11, dash: "60 300", w: 0.7, op: 0.40, dir:  1, rate: 0.14 },
      { r: R + 16, dash: "12 420", w: 0.6, op: 0.32, dir:  1, rate: 0.22 },
      { r: R + 22, dash: "90 260", w: 0.5, op: 0.22, dir:  1, rate: 0.10 },
      { r: R + 30, dash: "8 480",  w: 0.5, op: 0.18, dir:  1, rate: 0.26 },
      { r: R +  4, dash: "4 14",   w: 0.5, op: 0.35, dir: -1, rate: 0.30 },
    ];
    arcSpecs.forEach(s => {
      const el = whirlG.append("path")
        .attr("fill", "none").attr("stroke", INK)
        .attr("stroke-width", s.w).attr("stroke-linecap", "round")
        .attr("stroke-dasharray", s.dash).attr("opacity", s.op)
        .attr("d", `M${-s.r} 0 A${s.r} ${s.r} 0 1 1 ${s.r} 0 A${s.r} ${s.r} 0 1 1 ${-s.r} 0`);
      whirlArcs.push({ el, ...s });
    });

    /* ── orbit ticks ── */
    const tickG = svg.append("g");
    const ticks = [];
    for (let i = 0; i < 14; i++) {
      const el = tickG.append("line")
        .attr("x1", 0).attr("y1", 0).attr("x2", 0).attr("y2", -3)
        .attr("stroke", INK).attr("stroke-width", 0.6)
        .attr("stroke-linecap", "round").attr("opacity", 0.4);
      ticks.push({ el, baseAngle: (360 / 14) * i, baseR: R + 26 + (i % 3) * 2 });
    }

    /* ── globe limb ── */
    svg.append("circle").attr("r", R)
      .attr("fill", PAPER).attr("stroke", INK)
      .attr("stroke-width", 0.9).attr("opacity", 0.85);

    /* ── map layers ── */
    const mapG = svg.append("g");
    const graticule    = d3.geoGraticule10();
    const graticulePath = mapG.append("path").attr("fill","none")
      .attr("stroke", INK).attr("stroke-width", 0.3).attr("opacity", 0.18);
    const fillPath      = mapG.append("path").attr("fill", INK)
      .attr("opacity", 0.10).attr("stroke", "none");
    const highlightPath = mapG.append("path").attr("fill", RED)
      .attr("opacity", 0.92).attr("stroke", "none");
    const strokePath    = mapG.append("path").attr("fill", "none")
      .attr("stroke", INK).attr("stroke-width", 0.55)
      .attr("opacity", 0.85).attr("stroke-linejoin", "round");

    /* ── great-circle trail ── */
    const trailPath = svg.append("path").attr("fill", "none")
      .attr("stroke", INK).attr("stroke-width", 0.6)
      .attr("stroke-linecap", "round").attr("opacity", 0.45);

    /* ── teapot silhouette ── */
    const casketG = svg.append("g");
    const cs = casketG.append("g");
    cs.append("ellipse").attr("cx",0).attr("cy",1).attr("rx",5).attr("ry",3.2).attr("fill",INK);
    cs.append("rect").attr("x",-3).attr("y",3.6).attr("width",6).attr("height",1).attr("rx",0.3).attr("fill",INK);
    cs.append("path").attr("d","M -4 -0.6 L -7.4 -2.4 L -6.6 -0.6 L -4 0.8 Z").attr("fill",INK);
    cs.append("path").attr("d","M 4.5 -0.6 Q 7.6 -0.6 7.6 1.3 Q 7.6 2.9 4.5 2.7")
      .attr("stroke",INK).attr("stroke-width",1.2).attr("fill","none").attr("stroke-linecap","round");
    cs.append("path").attr("d","M -2.4 -2.1 Q 0 -2.7 2.4 -2.1 L 2.1 -1.5 L -2.1 -1.5 Z").attr("fill",INK);
    cs.append("circle").attr("cx",0).attr("cy",-3.1).attr("r",0.85).attr("fill",INK);

    /* ── dust particles ── */
    const dustG = svg.append("g");
    const dust  = [];
    for (let i = 0; i < 6; i++) {
      dust.push(dustG.append("circle").attr("r",0.7).attr("fill",INK).attr("opacity",0));
    }

    /* ── route ── */
    const SEA   = [108, 22];
    const USA   = [-96, 39];
    const interp = d3.geoInterpolate(SEA, USA);
    const greatCircle = {
      type: "LineString",
      coordinates: d3.range(0, 1.001, 1 / 64).map(t => interp(t))
    };

    /* ── load world atlas ── */
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r => r.json())
      .then(world => {
        const countries  = topojson.feature(world, world.objects.countries);
        const highlights = {
          type: "FeatureCollection",
          features: countries.features
            .filter(f => HIGHLIGHT_IDS.has(+f.id))
            .map(f => {
              if (+f.id !== 840) return f;
              const polys = f.geometry.type === "MultiPolygon"
                ? f.geometry.coordinates : [f.geometry.coordinates];
              const keep = polys.filter(poly => {
                const ring = poly[0];
                let lon = 0, lat = 0;
                ring.forEach(([x, y]) => { lon += x; lat += y; });
                lon /= ring.length; lat /= ring.length;
                return lon < -66 && lon > -125 && lat > 24 && lat < 50;
              });
              return { ...f, geometry: { type: "MultiPolygon", coordinates: keep } };
            })
        };
        strokePath.datum(countries);
        fillPath.datum(countries);
        highlightPath.datum(highlights);
        graticulePath.datum(graticule);
        trailPath.datum(greatCircle);
        requestAnimationFrame(frame);
      });

    /* ── animation loop ── */
    const start         = performance.now();
    const ROT_PERIOD    = 14000;
    const CASKET_PERIOD = 4200;
    const DUST_TRAIL    = 0.10;

    function liftPoint([x, y], lift) {
      const d = Math.hypot(x, y) || 1;
      const k = (d + lift) / d;
      return [x * k, y * k];
    }

    function placeCasket(u, t) {
      const proj = projection(interp(u));
      if (!proj) { casketG.attr("opacity", 0); return; }
      const lift = Math.sin(u * Math.PI) * 14;
      const [x, y] = liftPoint(proj, lift);
      const ahead  = projection(interp(Math.min(1, u + 0.01)));
      let rot = 0;
      if (ahead) {
        const [ax, ay] = liftPoint(ahead, Math.sin(Math.min(1, u + 0.01) * Math.PI) * 14);
        rot = Math.atan2(ay - y, ax - x) * 180 / Math.PI;
      }
      const bob = Math.sin(t / 180) * 1.2;
      casketG.attr("opacity", 1)
        .attr("transform", `translate(${x},${y + bob}) rotate(${rot * 0.25})`);
    }

    function frame(now) {
      const t = now - start;

      projection.rotate([((t / ROT_PERIOD) * 360) % 360, TILT, 0]);
      strokePath.attr("d", geoPath);
      fillPath.attr("d", geoPath);
      highlightPath.attr("d", geoPath);
      graticulePath.attr("d", geoPath);
      trailPath.attr("d", geoPath);

      whirlArcs.forEach(s =>
        s.el.attr("transform", `rotate(${(t * s.rate * s.dir) % 360})`));

      ticks.forEach((tk, i) => {
        const ang = (tk.baseAngle + t * 0.05) % 360;
        const r   = tk.baseR + Math.sin((t / 600) + i) * 1.2;
        const rad = ang * Math.PI / 180;
        const x = Math.cos(rad) * r, y = Math.sin(rad) * r;
        const tx = x - Math.sin(rad) * 4, ty = y + Math.cos(rad) * 4;
        tk.el.attr("x1",x).attr("y1",y).attr("x2",tx).attr("y2",ty)
          .attr("opacity", 0.18 + 0.32 * (0.5 + 0.5 * Math.sin((t / 380) + i)));
      });

      const u = (t % CASKET_PERIOD) / CASKET_PERIOD;
      placeCasket(u, t);

      dust.forEach((c, i) => {
        const du = u - ((i + 1) / dust.length) * DUST_TRAIL;
        if (du < 0) { c.attr("opacity", 0); return; }
        const proj = projection(interp(du));
        if (!proj)  { c.attr("opacity", 0); return; }
        const [x, y] = liftPoint(proj, Math.sin(du * Math.PI) * 14);
        c.attr("cx", x).attr("cy", y)
         .attr("r", 0.4 + (1 - i / dust.length) * 0.7)
         .attr("opacity", (1 - i / dust.length) * 0.55);
      });

      requestAnimationFrame(frame);
    }
  })();
  </script>
</body>
</html>
